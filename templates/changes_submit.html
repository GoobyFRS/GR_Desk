{% extends "base.html" %}

{% block title %}Submit New Change - gr_desk{% endblock %}

{% block content %}
<div class="container">
    <div class="logo">
        <img src="https://raw.githubusercontent.com/GoobyFRS/gr_desk/refs/heads/main/static/gr_desk-color.webp" alt="gr_desk Logo">
    </div>
    <h2>Submit New Change Request</h2>

    <div class="ticket-details">
        <form method="POST" action="/changes/submit-new" class="form-container">
        <div class="form-group">
            <label for="change_subject">Subject *</label>
            <input type="text" id="change_subject" name="change_subject" required>
        </div>

        <div class="form-group">
            <label for="change_description">Description *</label>
            <textarea id="change_description" name="change_description" rows="4" required></textarea>
        </div>

        <div class="form-group">
            <label for="change_implement_plan">Implementation Plan</label>
            <textarea id="change_implement_plan" name="change_implement_plan" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label for="change_rollback_plan">Rollback Plan</label>
            <textarea id="change_rollback_plan" name="change_rollback_plan" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label for="change_test_plan">Test Plan</label>
            <textarea id="change_test_plan" name="change_test_plan" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label for="change_start_timestamp">Start Date/Time</label>
            <input type="datetime-local" id="change_start_timestamp" name="change_start_timestamp">
        </div>

        <div class="form-group">
            <label for="change_end_timestamp">End Date/Time</label>
            <input type="datetime-local" id="change_end_timestamp" name="change_end_timestamp">
        </div>

            <button type="submit" class="btn">Submit Change</button>
            <a href="/changes/" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
