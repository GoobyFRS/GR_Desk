{% extends "base.html" %}

{% block title %}{% if mode == 'create' %}Hire Employee{% else %}Edit Employee{% endif %} - gr_desk{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1>{% if mode == 'create' %}Hire New Employee{% else %}Edit Employee{% endif %}</h1>

    <form method="POST" action="{% if mode == 'create' %}/hrm/submit-new{% else %}/hrm/profile/{{ employee.uuid }}/edit{% endif %}" class="form-container">
        <div class="form-group">
            <label for="tech_username">Username *</label>
            <input type="text" id="tech_username" name="tech_username" value="{{ employee.tech_username if employee else '' }}" required>
        </div>

        <div class="form-group">
            <label for="employee_first_name">First Name *</label>
            <input type="text" id="employee_first_name" name="employee_first_name" value="{{ employee.employee_first_name if employee else '' }}" required>
        </div>

        <div class="form-group">
            <label for="employee_last_name">Last Name *</label>
            <input type="text" id="employee_last_name" name="employee_last_name" value="{{ employee.employee_last_name if employee else '' }}" required>
        </div>

        <div class="form-group">
            <label for="employee_preferred_name">Preferred Name</label>
            <input type="text" id="employee_preferred_name" name="employee_preferred_name" value="{{ employee.employee_preferred_name if employee else '' }}">
        </div>

        <div class="form-group">
            <label for="employee_contact_email">Email *</label>
            <input type="email" id="employee_contact_email" name="employee_contact_email" value="{{ employee.employee_contact_email if employee else '' }}" required>
        </div>

        <div class="form-group">
            <label for="employee_ingame_username">In-Game Username</label>
            <input type="text" id="employee_ingame_username" name="employee_ingame_username" value="{{ employee.employee_ingame_username if employee else '' }}">
        </div>

        <div class="form-group">
            <label for="employee_dob">Date of Birth</label>
            <input type="date" id="employee_dob" name="employee_dob" value="{{ employee.employee_dob if employee else '' }}">
        </div>

        <div class="form-group">
            <label for="employee_state">State</label>
            <input type="text" id="employee_state" name="employee_state" value="{{ employee.employee_state if employee else '' }}">
        </div>

        {% if mode == 'edit' %}
        <div class="form-group">
            <label for="employee_role">Role</label>
            <select id="employee_role" name="employee_role">
                <option value="technician" {% if employee.employee_role == 'technician' %}selected{% endif %}>Technician</option>
                <option value="manager" {% if employee.employee_role == 'manager' %}selected{% endif %}>Manager</option>
                <option value="admin" {% if employee.employee_role == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>

        <div class="form-group">
            <label for="access_role">Access Level</label>
            <select id="access_role" name="access_role">
                <option value="technician" {% if employee.access_role == 'technician' %}selected{% endif %}>Technician</option>
                <option value="manager" {% if employee.access_role == 'manager' %}selected{% endif %}>Manager</option>
                <option value="admin" {% if employee.access_role == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>

        <div class="form-group">
            <label for="assigned_business_unit">Department</label>
            <select id="assigned_business_unit" name="assigned_business_unit">
                <option value="support" {% if employee.assigned_business_unit == 'support' %}selected{% endif %}>Support</option>
                <option value="billing" {% if employee.assigned_business_unit == 'billing' %}selected{% endif %}>Billing</option>
                <option value="engineering" {% if employee.assigned_business_unit == 'engineering' %}selected{% endif %}>Engineering</option>
            </select>
        </div>

        <div class="form-group">
            <label for="employee_compensation">Compensation</label>
            <input type="number" id="employee_compensation" name="employee_compensation" value="{{ employee.employee_compensation if employee else '' }}" step="0.01">
        </div>

        <div class="form-group">
            <label for="total_pto_available">PTO Available (hours)</label>
            <input type="number" id="total_pto_available" name="total_pto_available" value="{{ employee.total_pto_available if employee else 0 }}">
        </div>

        <div class="form-group">
            <input type="checkbox" id="is_on_probation" name="is_on_probation" {% if employee.is_on_probation %}checked{% endif %}>
            <label for="is_on_probation">On Probation</label>
        </div>
        {% endif %}

        <button type="submit" class="btn btn-primary">{% if mode == 'create' %}Hire Employee{% else %}Save Changes{% endif %}</button>
        <a href="/hrm/dashboard" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
