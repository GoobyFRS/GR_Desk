<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="static/favicon.ico"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Matt Faulkner">
    <meta name="description" content="gr_desk Employee Login">
    <meta name="robots" content="noindex, nofollow"> <!--Discourage Search Engine Indexing of this page-->
    <meta name="theme-color" content="#284389"> <!-- Mobile Browser stylized address bar.-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!-- Force IE to use latest rendering engine available.-->
    <!-- Social Media Preview -->
    <meta property="og:title" content="Login">
    <meta property="og:description" content="gr_desk, a Databaseless Service Desk for SMBs.">
    <meta property="og:image" content="https://raw.githubusercontent.com/GoobyFRS/gr_desk/refs/heads/main/static/gr_desk-color.webp">
    <meta property="og:url" content="">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Login">
    <meta name="twitter:description" content="Login">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/GoobyFRS/gr_desk/refs/heads/main/static/gr_desk-color.webp">

    <!-- Performance Enhancements -->
    <link rel="preconnect" href="https://fonts.bunny.net/css">
    <link rel="preconnect" href="https://fonts.bunny.net/css" crossorigin>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <!-- Local CSS and JavaScript Imports-->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="{{ url_for('static', filename='helpdesk.js') }}"></script>
    <script src="{{ url_for('static', filename='alerts.js') }}" defer></script>

    <title>gr_desk - Technician Login</title>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/GoobyFRS/gr_desk/refs/heads/main/static/gr_desk-color.webp" alt="gr_desk Logo">
        </div>
        <h2>Technician Login</h2>
        <form method="post">
            <label for="username">Technician ID:</label>
            <input type="text" id="username" name="tech_username_box" placeholder="Employee ID" minlength="2" maxlength="24" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="tech_password_box" placeholder="Secret" required>
            <br><br>

            <div class="cf-turnstile" data-sitekey="{{ sitekey }}" data-theme="dark"></div>

            <button type="submit" class="submit-btn">Login</button>
        </form>
        <p class="footer-text">©2025 gr_desk, FOSS created by <a href="https://github.com/goobyfrs">GoobyFRS</a></p>
    </div>
</body>
</html>
