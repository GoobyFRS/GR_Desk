{% extends "base.html" %}

{% block title %}{% if mode == 'create' %}Add Customer{% else %}Edit Customer{% endif %} - gr_desk{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1>{% if mode == 'create' %}Add New Customer{% else %}Edit Customer{% endif %}</h1>

    <form method="POST" action="{% if mode == 'create' %}/crm/submit-new{% else %}/crm/profile/{{ customer.uuid }}/edit{% endif %}" class="form-container">
        <div class="form-group">
            <label for="customer_username">Username *</label>
            <input type="text" id="customer_username" name="customer_username" value="{{ customer.customer_username if customer else '' }}" {% if mode == 'edit' %}readonly{% else %}required{% endif %}>
        </div>

        <div class="form-group">
            <label for="customer_first_name">First Name *</label>
            <input type="text" id="customer_first_name" name="customer_first_name" value="{{ customer.customer_first_name if customer else '' }}" required>
        </div>

        <div class="form-group">
            <label for="customer_last_name">Last Name *</label>
            <input type="text" id="customer_last_name" name="customer_last_name" value="{{ customer.customer_last_name if customer else '' }}" required>
        </div>

        <div class="form-group">
            <label for="customer_prefered_name">Preferred Name</label>
            <input type="text" id="customer_prefered_name" name="customer_prefered_name" value="{{ customer.customer_prefered_name if customer else '' }}">
        </div>

        <div class="form-group">
            <label for="customer_contact_email">Email *</label>
            <input type="email" id="customer_contact_email" name="customer_contact_email" value="{{ customer.customer_contact_email if customer else '' }}" required>
        </div>

        <div class="form-group">
            <label for="customer_ingame_username">In-Game Username</label>
            <input type="text" id="customer_ingame_username" name="customer_ingame_username" value="{{ customer.customer_ingame_username if customer else '' }}">
        </div>

        {% if mode == 'edit' %}
        <div class="form-group">
            <label for="customer_account_status">Account Status</label>
            <select id="customer_account_status" name="customer_account_status">
                <option value="Active" {% if customer.customer_account_status == 'Active' %}selected{% endif %}>Active</option>
                <option value="Inactive" {% if customer.customer_account_status == 'Inactive' %}selected{% endif %}>Inactive</option>
                <option value="Banned" {% if customer.customer_account_status == 'Banned' %}selected{% endif %}>Banned</option>
                <option value="Requested Closed" {% if customer.customer_account_status == 'Requested Closed' %}selected{% endif %}>Requested Closed</option>
            </select>
        </div>

        <div class="form-group">
            <label for="customer_fraud_risk">Fraud Risk Level</label>
            <select id="customer_fraud_risk" name="customer_fraud_risk">
                <option value="unknown" {% if customer.customer_fraud_risk == 'unknown' %}selected{% endif %}>Unknown</option>
                <option value="low" {% if customer.customer_fraud_risk == 'low' %}selected{% endif %}>Low</option>
                <option value="medium" {% if customer.customer_fraud_risk == 'medium' %}selected{% endif %}>Medium</option>
                <option value="high" {% if customer.customer_fraud_risk == 'high' %}selected{% endif %}>High</option>
            </select>
        </div>

        <div class="form-group">
            <input type="checkbox" id="customer_vip_status" name="customer_vip_status" {% if customer.customer_vip_status %}checked{% endif %}>
            <label for="customer_vip_status">VIP Status</label>
        </div>
        {% endif %}

        <button type="submit" class="btn btn-primary">{% if mode == 'create' %}Create Customer{% else %}Save Changes{% endif %}</button>
        <a href="/crm/dashboard" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
