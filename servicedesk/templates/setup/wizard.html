{% extends "base.html" %}

{% block title %}Setup Wizard - {{ branding.brand.name }}{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="setup-wizard">
    <div class="card">
        <h1>Welcome to {{ branding.brand.name }}</h1>
        <p class="subtitle">Let's create your administrator account to get started.</p>

        <form method="POST" class="form">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name"
                       value="{{ first_name | default('') }}" required
                       autocomplete="given-name">
            </div>

            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name"
                       value="{{ last_name | default('') }}" required
                       autocomplete="family-name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email"
                       value="{{ email | default('') }}" required
                       autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       minlength="8" required
                       autocomplete="new-password"
                       aria-describedby="password-hint">
                <small id="password-hint" class="form-hint">Minimum 8 characters</small>
            </div>

            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm"
                       minlength="8" required
                       autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Create Admin Account
            </button>
        </form>
    </div>
</div>
{% endblock %}
